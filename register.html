<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Rental Disco</title>
  <link rel="icon" type="image/jpeg" href="images/rentaldisco_logo.jpg">
  <script src="tailwind.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            'brand-primary': '#9333EA', /* Vibrant Purple */
            'brand-dark': '#020617',    /* Deep Slate */
            'brand-light': '#FAF5FF',   /* Soft Purple Tint */
            white: '#FFFFFF'
          }
        }
      }
    }
  </script>
  
  <style>
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in {
      animation: fadeInUp 0.8s ease-out;
    }

    /* RTL Support */
    [dir="rtl"] .animated-circle-left {
      left: auto;
      right: 2.5rem;
    }

    [dir="rtl"] .animated-circle-right {
      right: auto;
      left: 2.5rem;
    }

    /* Hide scrollbar for Chrome, Safari and Opera */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    /* Hide scrollbar for IE, Edge and Firefox */
    .no-scrollbar {
      -ms-overflow-style: none;  /* IE and Edge */
      scrollbar-width: none;  /* Firefox */
    }

    /* Ensure no horizontal scroll */
    html, body {
      overflow-x: hidden;
      width: 100%;
    }
  </style>
</head>
<body class="font-sans antialiased bg-white dark:bg-[#0a0a0a] h-screen overflow-x-hidden flex flex-col transition-colors duration-300 no-scrollbar">

  <nav class="bg-white dark:bg-[#111111] fixed w-full top-0 z-50 border-b border-gray-200 dark:border-white/10 transition-colors duration-300">
    <div class="max-w-[1400px] mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-[90px]">

        <div class="flex-shrink-0">
          <a href="index.html" class="flex items-center space-x-3">
            <div class="flex flex-col">
              <span class="text-2xl font-black tracking-tight text-brand-dark dark:text-white uppercase">Rental<span class="text-brand-primary">Disco.</span></span>
            </div>
          </a>
        </div>

        <div class="flex items-center space-x-4">
          <button id="rtl-toggle" class="text-xs font-bold uppercase tracking-widest text-gray-400 hover:text-brand-primary transition-colors duration-300" title="Toggle RTL">
            RTL
          </button>

          <div class="h-8 w-px bg-gray-200 dark:bg-gray-800 mx-2"></div>

          <button id="theme-toggle" class="w-10 h-10 flex items-center justify-center text-gray-400 hover:text-brand-primary dark:hover:text-brand-primary transition-colors duration-300" title="Toggle Theme">
            <i class="fas fa-moon dark:hidden text-lg"></i>
            <i class="fas fa-sun hidden dark:inline text-lg"></i>
          </button>
        </div>

      </div>
    </div>
  </nav>

  <div class="animated-circle-left absolute top-20 ltr:left-10 rtl:right-10 w-72 h-72 bg-brand-primary/10 rounded-full blur-3xl animate-pulse pointer-events-none"></div>
  <div class="animated-circle-right absolute bottom-20 ltr:right-10 rtl:left-10 w-96 h-96 bg-brand-light/10 dark:bg-brand-primary/5 rounded-full blur-3xl animate-pulse pointer-events-none" style="animation-delay: 1.5s;"></div>

  <div class="flex-1 flex items-center justify-center p-4 pt-[110px] pb-10">
    <div class="w-full max-w-md">
      
      <div class="bg-white dark:bg-[#111111] shadow-2xl p-6 md:p-8 border border-gray-200 dark:border-white/10 animate-fade-in relative z-10 group">

        <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-brand-primary to-transparent"></div>

        <div class="text-center mb-6">
          <h2 class="text-2xl font-black text-gray-900 dark:text-white uppercase tracking-tight mb-2">Create Account.</h2>
          <p class="text-[10px] uppercase tracking-[0.2em] font-bold text-gray-500 dark:text-gray-400">Join the ultimate silent disco network</p>
        </div>

        <form class="space-y-4" onsubmit="handleRegister(event)">

          <div>
            <label class="block text-[10px] font-bold uppercase tracking-widest text-gray-900 dark:text-white mb-1.5">First Name</label>
            <input 
              type="text" 
              required
              placeholder="FIRST NAME"
              class="w-full px-3 py-2 bg-transparent border border-gray-300 dark:border-gray-700 text-gray-900 dark:text-white text-xs uppercase tracking-widest focus:outline-none focus:border-brand-primary transition-all"
            />
          </div>
          
          <div>
            <label class="block text-[10px] font-bold uppercase tracking-widest text-gray-900 dark:text-white mb-1.5">Last Name</label>
            <input 
              type="text" 
              required
              placeholder="LAST NAME"
              class="w-full px-3 py-2 bg-transparent border border-gray-300 dark:border-gray-700 text-gray-900 dark:text-white text-xs uppercase tracking-widest focus:outline-none focus:border-brand-primary transition-all"
            />
          </div>

          <div>
            <label class="block text-[10px] font-bold uppercase tracking-widest text-gray-900 dark:text-white mb-1.5">
              Email Address
            </label>
            <input 
              type="email" 
              required
              placeholder="YOUR.EMAIL@EXAMPLE.COM"
              class="w-full px-3 py-2 bg-transparent border border-gray-300 dark:border-gray-700 text-gray-900 dark:text-white text-xs uppercase tracking-widest focus:outline-none focus:border-brand-primary transition-all"
            />
          </div>

          <div>
            <label class="block text-[10px] font-bold uppercase tracking-widest text-gray-900 dark:text-white mb-1.5">
              Phone Number
            </label>
            <input 
              type="tel" 
              required
              placeholder="+1 234 567 8900"
              class="w-full px-3 py-2 bg-transparent border border-gray-300 dark:border-gray-700 text-gray-900 dark:text-white text-xs uppercase tracking-widest focus:outline-none focus:border-brand-primary transition-all"
            />
          </div>

          <div class="flex items-center pt-2">
            <input type="checkbox" required class="w-3.5 h-3.5 rounded-none border-gray-300 text-brand-primary focus:ring-0 focus:ring-offset-0 bg-transparent cursor-pointer">
            <span class="ltr:ml-3 rtl:mr-3 text-[10px] uppercase tracking-widest font-bold text-gray-500 dark:text-gray-400">
              I agree to the <span class="text-brand-primary cursor-pointer hover:text-gray-900 dark:hover:text-white transition-colors">Terms & Conditions</span>
            </span>
          </div>

          <button 
            type="submit"
            class="w-full py-3 mt-4 bg-brand-dark dark:bg-white text-white dark:text-brand-dark hover:bg-[#7e22ce] dark:hover:bg-brand-primary dark:hover:text-white font-bold uppercase tracking-widest text-xs transition-all duration-300 flex items-center justify-center space-x-2"
          >
            <span>Register</span>
            <i class="fas fa-arrow-right text-[10px]"></i>
          </button>

          <div class="relative my-6">
            <div class="absolute inset-0 flex items-center">
              <div class="w-full border-t border-gray-200 dark:border-gray-800"></div>
            </div>
            <div class="relative flex justify-center text-[10px] uppercase tracking-widest font-bold">
              <span class="px-3 bg-white dark:bg-[#111111] text-gray-400">Or Sign Up With</span>
            </div>
          </div>

          <div class="grid grid-cols-2 gap-3">
            <button 
              type="button"
              class="flex items-center justify-center px-3 py-2 border border-gray-300 dark:border-gray-700 hover:border-brand-primary dark:hover:border-brand-primary transition-colors bg-transparent"
            >
              <svg class="w-3.5 h-3.5 ltr:mr-2 rtl:ml-2" viewBox="0 0 24 24">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
              </svg>
              <span class="text-[10px] font-bold uppercase tracking-widest text-gray-900 dark:text-white">Google</span>
            </button>
            <button 
              type="button"
              class="flex items-center justify-center px-3 py-2 border border-gray-300 dark:border-gray-700 hover:border-brand-primary dark:hover:border-brand-primary transition-colors bg-transparent"
            >
              <i class="fab fa-facebook text-blue-600 text-base ltr:mr-2 rtl:ml-2"></i>
              <span class="text-[10px] font-bold uppercase tracking-widest text-gray-900 dark:text-white">Facebook</span>
            </button>
          </div>

        </form>

        <div class="mt-6 text-center text-xs font-bold uppercase tracking-widest text-gray-500">
          Already a Member? 
          <a href="login.html" class="text-gray-900 dark:text-white hover:text-brand-primary transition-colors ltr:ml-1 rtl:mr-1 border-b border-brand-primary pb-0.5">Sign In</a>
        </div>

      </div>

    </div>
  </div>

  <script>
    // Form Submission
    function handleRegister(event) {
      event.preventDefault();

      const button = event.target.querySelector('button[type="submit"]');
      const icon = button.querySelector('i');
      const span = button.querySelector('span');
      
      icon.className = 'fas fa-spinner fa-spin';
      span.innerText = 'CREATING ACCOUNT...';
      button.disabled = true;
      button.classList.add('opacity-50', 'cursor-not-allowed');

      setTimeout(() => {
        alert('Account created successfully! Redirecting to login...');
        window.location.href = 'login.html';
      }, 1500);
    }

    // Theme Toggle Function
    const themeToggle = document.getElementById('theme-toggle');
    const html = document.documentElement;

    function toggleTheme() {
      if (html.classList.contains('dark')) {
        html.classList.remove('dark');
        localStorage.setItem('theme', 'light');
      } else {
        html.classList.add('dark');
        localStorage.setItem('theme', 'dark');
      }
    }

    if (themeToggle) themeToggle.addEventListener('click', toggleTheme);
    if (localStorage.getItem('theme') === 'dark') html.classList.add('dark');

    // RTL Toggle Function
    const rtlToggle = document.getElementById('rtl-toggle');

    function toggleRTL() {
      if (html.getAttribute('dir') === 'rtl') {
        html.removeAttribute('dir');
        localStorage.setItem('direction', 'ltr');
      } else {
        html.setAttribute('dir', 'rtl');
        localStorage.setItem('direction', 'rtl');
      }
    }

    if (rtlToggle) rtlToggle.addEventListener('click', toggleRTL);
    if (localStorage.getItem('direction') === 'rtl') html.setAttribute('dir', 'rtl');
  </script>

</body>
</html>
